<!DOCTYPE html>
<html>

<head>

<title>AI Recommendation</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Internship Recommendation</h1>

<div class="card">

<h2>Student Details</h2>

<p><b>Name :</b> {{ name }}</p>

<p><b>Department :</b> {{ department }}</p>

<p><b>CGPA :</b> {{ cgpa }}</p>

<p><b>Skills :</b> {{ skills }}</p>

<p><b>Interest :</b> {{ interest }}</p>

<p><b>Location :</b> {{ location }}</p>

<h2>Recommended Internship</h2>

<h1 style="color:green;">
{{ result }}
</h1>

<br>

<a href="/dashboard">
<button>Back to Dashboard</button>
</a>

</div>

</div>

</body>

</html>
